<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente de Accesibilidad Web</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      width: 320px;
      background: #f1f3f4;
      color: #202124;
      padding: 8px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .popup-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 0;
    }

    .popup-titulo {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      padding-right: 8px;
    }

    .popup-descripcion {
      padding: 8px 20px 0;
      font-size: 13px;
      color: #5f6368;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .popup-acciones {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
    }

    .btn {
      width: 100%;
      min-height: 44px;
      padding: 10px 24px;
      border-radius: 24px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .01em;
      transition: background .15s, border-color .15s;
    }

    .btn-primario {
      background: #202124;
      color: #fff;
      border: 2px solid #202124;
    }
    .btn-primario:hover { background: #3c4043; border-color: #3c4043; }

    .btn-secundario {
      background: transparent;
      color: #202124;
      border: 1.5px solid #dadce0;
    }
    .btn-secundario:hover { background: #f8f9fa; border-color: #bdc1c6; }

    /* shared focus ring */
    .btn:focus-visible,
    #cerrar:focus-visible,
    .btn-ajustes:focus-visible,
    .btn-link:focus-visible,
    #toggle-colores:focus-visible + .toggle-slider {
      outline: 3px solid #202124;
      outline-offset: 2px;
      border-radius: 4px;
    }

    #cerrar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      margin-top: -4px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      color: #5f6368;
      font-size: 18px;
    }
    #cerrar:hover { background: #f1f3f4; }
    #cerrar:focus-visible { border-radius: 50%; }

    /* ── Settings section ── */
    .settings-section {
      border-top: 1px solid #e8eaed;
    }

    .btn-ajustes {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 20px;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
      cursor: pointer;
      border-radius: 0;
    }
    .btn-ajustes:hover { background: #f8f9fa; color: #202124; }
    .btn-ajustes:focus-visible { border-radius: 0; outline-offset: -3px; }

    .ajustes-chevron { font-size: 11px; transition: transform .2s; }
    .btn-ajustes[aria-expanded="true"] .ajustes-chevron { transform: rotate(180deg); }

    .ajustes-panel { padding: 4px 20px 16px; }

    /* Setting row */
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      gap: 12px;
    }
    .setting-item + .setting-item { border-top: 1px solid #f1f3f4; }

    .setting-nombre { font-size: 13px; color: #202124; }

    /* Toggle switch */
    .toggle-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      cursor: pointer;
      gap: 12px;
      font-size: 13px;
    }

    .toggle-switch { position: relative; flex-shrink: 0; }

    #toggle-colores {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      display: block;
      width: 36px;
      height: 20px;
      background: #bdc1c6;
      border-radius: 10px;
      transition: background .2s;
      position: relative;
      cursor: pointer;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    #toggle-colores:checked + .toggle-slider { background: #1a73e8; }
    #toggle-colores:checked + .toggle-slider::after { transform: translateX(16px); }

    /* Shortcut row */
    .setting-atajo { flex-direction: column; align-items: flex-start; gap: 4px; padding: 10px 0; }
    .atajo-info { display: flex; align-items: center; gap: 8px; width: 100%; }
    .atajo-badge {
      font-size: 11px;
      font-family: monospace;
      background: #f1f3f4;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 2px 6px;
      color: #202124;
    }
    .atajo-nota { font-size: 11px; color: #80868b; }

    .btn-link {
      background: none;
      border: none;
      color: #1557b0;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 2px 0;
      text-decoration: underline;
    }
    .btn-link:hover { color: #1557b0; }

    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn, .toggle-slider, .toggle-slider::after, .ajustes-chevron { transition: none; }
    }
  </style>

</head>
<body>
  <div class="card">
    <div class="popup-header">
      <h1 class="popup-titulo">Asistente de Accesibilidad Web</h1>
      <button id="cerrar" aria-label="Cerrar popup">&#x2715;</button>
    </div>

    <p class="popup-descripcion">Mejora la accesibilidad de la página actual usando inteligencia artificial.</p>

    <div class="popup-acciones" role="group" aria-label="Acciones del asistente">
      <button id="activar" class="btn btn-primario">Activar asistente</button>
      <button id="desactivar" class="btn btn-secundario">Desactivar asistente</button>
    </div>

    <div class="settings-section">
      <button id="ajustes-toggle" class="btn-ajustes" aria-expanded="false" aria-controls="ajustes-panel">
        <span>Ajustes</span>
        <span class="ajustes-chevron" aria-hidden="true">▾</span>
      </button>

      <div id="ajustes-panel" hidden>
        <div class="ajustes-panel">

          <div class="setting-item">
            <label class="toggle-label" for="toggle-colores">
              <span>Mostrar colores en el resumen</span>
              <span class="toggle-switch">
                <input type="checkbox" id="toggle-colores" role="switch" aria-label="Mostrar colores en el resumen">
                <span class="toggle-slider"></span>
              </span>
            </label>
          </div>
          <div class="setting-item setting-atajo">
            <span class="setting-nombre">Atajo de teclado</span>
            <div class="atajo-info">
              <span class="atajo-badge">Alt+Shift+A</span>
              <span class="atajo-nota">(por defecto, personalizable)</span>
            </div>
            <button id="btn-atajo" class="btn-link">
              Personalizar en la configuración de Chrome
              <span class="visually-hidden">(abre una nueva pestaña)</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
